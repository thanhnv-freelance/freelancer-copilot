<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freelancer Copilot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #0a0a0a;
      color: #e5e5e5;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #1f1f1f;
    }
    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.01em;
    }
    .header-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 999px;
      background: #1a1a1a;
      color: #666;
      border: 1px solid #2a2a2a;
    }
    .btn-gear {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.15s;
    }
    .btn-gear:hover { color: #e5e5e5; }

    /* ── States ── */
    .state { padding: 24px 16px; }

    .state-idle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
      color: #555;
    }
    .state-idle svg { color: #333; }
    .state-idle p { font-size: 12px; line-height: 1.5; }

    .state-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: #666;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #2a2a2a;
      border-top-color: #e5e5e5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .state-error { color: #f87171; font-size: 12px; line-height: 1.5; }

    .state-success {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }
    .success-icon { font-size: 28px; }
    .success-msg { color: #4ade80; font-size: 13px; font-weight: 500; }
    .success-sub { color: #555; font-size: 11px; }

    /* ── Job preview ── */
    .job-preview { padding: 0 0 4px; }

    .job-title {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      line-height: 1.4;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1a1a1a;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 16px;
      border-bottom: 1px solid #1a1a1a;
    }
    .meta-chip {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #1a1a1a;
      color: #aaa;
      border: 1px solid #2a2a2a;
    }
    .meta-chip.verified { color: #4ade80; border-color: #166534; background: #052e16; }

    .skills-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 10px 16px;
      border-bottom: 1px solid #1a1a1a;
    }
    .skill-tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 5px;
      background: #161616;
      color: #888;
      border: 1px solid #222;
    }
    .skills-more { font-size: 11px; color: #555; align-self: center; }

    .client-row {
      padding: 10px 16px;
      border-bottom: 1px solid #1a1a1a;
      color: #666;
      font-size: 11px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .client-row span { color: #aaa; }

    /* ── Footer ── */
    .footer {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
    }
    .btn-primary {
      flex: 1;
      padding: 8px 14px;
      border-radius: 8px;
      background: #fff;
      color: #000;
      font-size: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-primary.loading { opacity: 0.5; }

    .btn-secondary {
      padding: 8px 14px;
      border-radius: 8px;
      background: transparent;
      color: #888;
      font-size: 12px;
      border: 1px solid #2a2a2a;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-secondary:hover { color: #e5e5e5; border-color: #444; }

    .btn-link {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 8px;
      background: #fff;
      color: #000;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn-link:hover { opacity: 0.85; }

    /* ── Settings panel ── */
    .settings {
      padding: 14px 16px;
      border-top: 1px solid #1f1f1f;
      display: none;
    }
    .settings.open { display: block; }
    .settings-title {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; }
    .field input {
      width: 100%;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #2a2a2a;
      background: #111;
      color: #e5e5e5;
      font-size: 12px;
      outline: none;
    }
    .field input:focus { border-color: #555; }
    .btn-save {
      padding: 6px 14px;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e5e5e5;
      font-size: 12px;
      border: 1px solid #2a2a2a;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .btn-save:hover { border-color: #555; }
    .save-ok { font-size: 11px; color: #4ade80; margin-left: 8px; opacity: 0; transition: opacity 0.3s; }
    .save-ok.show { opacity: 1; }

    /* hide utility */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="header-title">Freelancer Copilot</span>
      <span class="header-badge" id="platform-badge">Upwork</span>
    </div>
    <button class="btn-gear" id="btn-settings" title="Settings">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- State: not a job page -->
  <div class="state state-idle hidden" id="state-idle">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
    </svg>
    <p>Open an Upwork job posting<br>to import it here.</p>
  </div>

  <!-- State: loading / extracting -->
  <div class="state state-loading hidden" id="state-loading">
    <div class="spinner"></div>
    <span id="loading-msg">Extracting job data…</span>
  </div>

  <!-- State: error -->
  <div class="state state-error hidden" id="state-error">
    <p id="error-msg"></p>
  </div>

  <!-- State: success -->
  <div class="state state-success hidden" id="state-success">
    <div class="success-icon">✓</div>
    <div class="success-msg">Job imported!</div>
    <div class="success-sub">Scored and ready to analyze.</div>
    <a id="view-link" class="btn-link" href="#" target="_blank">View in Copilot →</a>
  </div>

  <!-- Job preview -->
  <div class="job-preview hidden" id="job-preview">
    <div class="job-title" id="preview-title"></div>

    <div class="meta-row" id="meta-row"></div>

    <div class="skills-row hidden" id="skills-row"></div>

    <div class="client-row hidden" id="client-row"></div>
  </div>

  <!-- Footer (import button) -->
  <div class="footer hidden" id="footer">
    <button class="btn-primary" id="btn-import">Import Job</button>
    <button class="btn-secondary" id="btn-retry">Re-extract</button>
  </div>

  <!-- Settings panel -->
  <div class="settings" id="settings-panel">
    <div class="settings-title">Settings</div>
    <div class="field">
      <label>App URL</label>
      <input type="text" id="input-app-url" placeholder="http://localhost:3005" />
    </div>
    <div class="field">
      <label>API Key (from .env → EXTENSION_API_KEY)</label>
      <input type="password" id="input-api-key" placeholder="fc_ext_…" />
    </div>
    <div style="display:flex;align-items:center">
      <button class="btn-save" id="btn-save-settings">Save</button>
      <span class="save-ok" id="save-ok">Saved</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
